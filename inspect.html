<!DOCTYPE html>


<title>File Inspector</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #121212;
        color: #e0e0e0;
        padding: 20px;
        margin: 0;
    }

    h1 {
        color: #00e676;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
    }

    .section {
        background-color: #1e1e1e;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .label {
        font-weight: bold;
        color: #88c0d0;
    }

    pre {
        background-color: #2e3440;
        color: #d8dee9;
        padding: 10px;
        border-radius: 4px;
        overflow-x: auto;
        font-family: 'Courier New', Courier, monospace;
    }

    img {
        max-width: 100%;
        max-height: 400px;
        border: 1px solid #444;
        margin-top: 10px;
        display: block;
    }
</style>
</head>

<body>
    <h1>File Inspector Tool</h1>

    <div class="section" id="meta">
        <h2>File Metadata</h2>
        <p><span class="label">File Path:</span>
            file:///C:/Users/isaiah9238/.gemini/antigravity-ide/brain/99a5ddea-6f69-4880-adeb-a3bad39510a9/uploaded_media_1782077459829.img
        </p>
        <p><span class="label">Status:</span> <span id="status">Loading...</span></p>
    </div>

    <div class="section" id="binary-header">
        <h2>File Header (First 100 Bytes)</h2>
        <pre id="header-hex">Reading...</pre>
        <pre id="header-ascii">Reading...</pre>
    </div>

    <div class="section" id="image-test">
        <h2>Image Test</h2>
        <div id="image-container">Testing...</div>
    </div>

    <div class="section" id="audio-test">
        <h2>Audio Test</h2>
        <div id="audio-container">Testing...</div>
    </div>

    <script>
        const filePath = "file:///C:/Users/isaiah9238/.gemini/antigravity-ide/brain/99a5ddea-6f69-4880-adeb-a3bad39510a9/uploaded_media_1782077459829.img";

        async function inspect() {
            try {
                document.getElementById('status').innerText = "Fetching file...";
                const response = await fetch(filePath);
                if (!response.ok) {
                    throw new Error("HTTP response was not ok: " + response.statusText);
                }
                const blob = await response.blob();
                document.getElementById('status').innerText = `Fetched successfully! Size: ${blob.size} bytes, Type: ${blob.type || 'unknown'}`;

                // Read header
                const headerBuffer = await blob.slice(0, 100).arrayBuffer();
                const view = new DataView(headerBuffer);
                let hexStr = "";
                let asciiStr = "";
                for (let i = 0; i < headerBuffer.byteLength; i++) {
                    const byte = view.getUint8(i);
                    hexStr += byte.toString(16).padStart(2, '0') + " ";
                    if (byte >= 32 && byte <= 126) {
                        asciiStr += String.fromCharCode(byte);
                    } else {
                        asciiStr += ".";
                    }
                }
                document.getElementById('header-hex').innerText = hexStr;
                document.getElementById('header-ascii').innerText = asciiStr;

                // Test as image
                const objectURL = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => {
                    document.getElementById('image-container').innerHTML = `<p style="color: #00e676">Valid Image!</p>`;
                    document.getElementById('image-container').appendChild(img);
                };
                img.onerror = (e) => {
                    document.getElementById('image-container').innerHTML = `<p style="color: #ff5252">Not a valid image</p>`;
                };
                img.src = objectURL;

                // Test as audio
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await blob.arrayBuffer();
                audioCtx.decodeAudioData(audioBuffer,
                    (decodedData) => {
                        document.getElementById('audio-container').innerHTML = `
                            <p style="color: #00e676">Valid Audio File!</p>
                            <p><span class="label">Duration:</span> ${decodedData.duration.toFixed(2)} seconds</p>
                            <p><span class="label">Sample Rate:</span> ${decodedData.sampleRate} Hz</p>
                            <p><span class="label">Channels:</span> ${decodedData.numberOfChannels}</p>
                        `;
                    },
                    (err) => {
                        document.getElementById('audio-container').innerHTML = `<p style="color: #ff5252">Failed to decode as audio: ${err.message || err}</p>`;
                    }
                );

            } catch (err) {
                document.getElementById('status').innerText = "Error: " + err.message;
                console.error(err);
            }
        }

        inspect();
    </script>
</body>
