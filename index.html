<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sketch Project</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background-color: #181825;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid #313244;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #1e1e2e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #313244;
        }

        .control-group h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #b4befe;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea {
            background-color: #11111b;
            border: 1px solid #313244;
            color: #cdd6f4;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #89b4fa;
        }

        button {
            background-color: #89b4fa;
            color: #11111b;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #b4befe;
        }

        button:active {
            transform: scale(0.98);
        }

        #sketchCanvas {
            flex: 1;
            width: 100%;
            height: 100%;
            display: block;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Surveyor-Sketch</h2>
        
        <div class="control-group">
            <h3>Traverse Controls</h3>
            <input type="number" id="input-az" placeholder="Azimuth (degrees)" step="any">
            <input type="number" id="input-dist" placeholder="Distance" step="any">
            <button id="btn-traverse">Traverse</button>
        </div>

        <div class="control-group">
            <h3>Field Notes</h3>
            <textarea id="textarea-field-note" placeholder="Enter notes here..."></textarea>
            <button id="btn-process-note">Process Note</button>
        </div>
    </div>

    <div class="main-content">
        <canvas id="sketchCanvas"></canvas>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
