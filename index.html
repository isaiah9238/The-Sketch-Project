<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sketch Project</title>
    <link rel="stylesheet" href="/src/UI/styles/styles.css">
</head>
<body>
    <div id="sidebar">
        <h1>Surveyor-Sketch</h1>
        
        <div class="card">
            <strong>Account</strong>
            <div id="user-info" style="font-size: 0.9em; margin-bottom: 8px; color: var(--text-muted); word-wrap: break-word;">Not logged in</div>
            <button id="btn-login" class="action-btn" style="background-color: #4285F4; color: white;">Sign In with Google</button>
            <button id="btn-logout" class="action-btn" style="display: none; background-color: #555; color: white; margin-top: 4px;">Sign Out</button>
        </div>
        
        <div class="card">
            <strong>Traverse Controls</strong>
            <div class="input-group">
                <span class="label-text">Azm</span>
                <input type="number" id="input-az" placeholder="Degrees" step="any">
            </div>
            <div class="input-group">
                <span class="label-text">Dist</span>
                <input type="number" id="input-dist" placeholder="Length" step="any">
            </div>
            <button id="btn-traverse" class="action-btn">Traverse</button>
        </div>

        <div class="card">
            <strong>Field Notes</strong>
            <textarea id="textarea-field-note" placeholder="Enter notes here..." style="width: 100%; box-sizing: border-box; background: var(--bg-app); border: 1px solid var(--border); color: var(--text-main); border-radius: 4px; padding: 6px; min-height: 80px; resize: vertical; margin-bottom: 8px; font-family: inherit;"></textarea>
            <button id="btn-process-note" class="action-btn">Process Note</button>
        </div>

        <div class="card">
            <strong>Tunnel Sequences</strong>
            <button id="btn-morph" class="action-btn" style="margin-top: 8px;">Trigger Morph</button>
        </div>
        <div class="card">
            <strong>System</strong>
            <button id="btn-clear" class="action-btn" style="margin-top: 8px; background-color: #ff4a4a; color: #111;">Wipe Data</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="sketchCanvas"></canvas>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
